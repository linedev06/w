<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultaCheck — Painel Interno</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#7C3AED;
  --purple-deep:#6D28D9;
  --purple-light:#F5F3FF;
  --purple-mist:#EDE9FE;
  --green:#10B981;
  --green-light:rgba(16,185,129,.08);
  --text:#1E1B2E;
  --text-sec:#6B7280;
  --text-dim:#9CA3AF;
  --bg:#F0EFF2;
  --card:#FFFFFF;
  --border:#E5E7EB;
}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* ═══ HEADER ═══ */
.panel-header{
  background:var(--text);
  padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
}
.panel-brand{
  display:flex;align-items:center;gap:16px;
}
.panel-logo{
  font-family:'Montserrat',sans-serif;font-weight:400;
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.5);
}
.panel-logo span{color:rgba(255,255,255,.85)}
.panel-divider{width:1px;height:16px;background:rgba(255,255,255,.12)}
.panel-label{
  font-family:'Montserrat',sans-serif;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.3);
}
.panel-user{
  font-size:12px;color:rgba(255,255,255,.4);
  display:flex;align-items:center;gap:10px;
}
.panel-avatar{
  width:28px;height:28px;border-radius:50%;
  background:var(--purple);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:400;
}

/* ═══ SUMMARY BAR ═══ */
.summary-bar{
  padding:28px 40px;
  display:flex;align-items:baseline;gap:32px;
}
.summary-item{
  display:flex;align-items:baseline;gap:8px;
}
.summary-number{
  font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:28px;color:var(--text);line-height:1;
}
.summary-number.accent{color:var(--purple)}
.summary-text{
  font-size:12px;color:var(--text-dim);
  font-family:'Montserrat',sans-serif;
  letter-spacing:.5px;
}
.summary-sep{
  width:1px;height:20px;background:var(--border);
  align-self:center;
}

/* ═══ CONTROLS ═══ */
.controls{
  padding:0 40px 24px;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;
}
.control-tabs{
  display:flex;gap:0;
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  background:var(--card);
}
.tab-btn{
  font-family:'Montserrat',sans-serif;font-weight:400;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:9px 18px;
  border:none;background:transparent;
  color:var(--text-dim);cursor:pointer;
  transition:all .15s;
  border-right:1px solid var(--border);
}
.tab-btn:last-child{border-right:none}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--purple);color:#fff}
.search-box{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;border:1px solid var(--border);
  border-radius:8px;background:var(--card);
}
.search-box svg{color:var(--text-dim);flex-shrink:0}
.search-box input{
  border:none;outline:none;font-family:'Inter',sans-serif;
  font-size:13px;color:var(--text);background:transparent;width:200px;
}
.search-box input::placeholder{color:var(--text-dim)}

/* ═══ CASE LIST ═══ */
.cases{padding:0 40px 48px}

/* Table header */
.case-header{
  display:grid;
  grid-template-columns:88px 1.3fr 1fr 72px 110px 32px;
  gap:12px;
  padding:0 20px 10px;
  align-items:center;
}
.case-header span{
  font-family:'Montserrat',sans-serif;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-dim);
}
.case-header span:nth-child(4){text-align:center}

/* Card */
.case-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:6px;
  overflow:hidden;
  transition:box-shadow .2s, border-color .2s;
}
.case-card:hover{
  border-color:var(--purple-mist);
  box-shadow:0 4px 20px rgba(124,58,237,.05);
}

.case-row{
  display:grid;
  grid-template-columns:88px 1.3fr 1fr 72px 110px 32px;
  gap:12px;
  padding:15px 20px;
  align-items:center;
  cursor:pointer;
}
.cell-date{
  font-family:'Montserrat',sans-serif;font-size:11px;
  letter-spacing:.3px;color:var(--text-sec);
}
.cell-client{}
.cell-name{font-size:14px;font-weight:500;margin-bottom:1px}
.cell-plate{
  font-family:'Montserrat',sans-serif;font-size:10px;
  letter-spacing:1px;color:var(--text-dim);
}
.cell-infraction{font-size:13px;color:var(--text-sec);font-weight:300}
.cell-score{
  text-align:center;
  font-family:'Montserrat',sans-serif;font-weight:400;font-size:15px;
}
.score-num{color:var(--purple)}
.score-none{color:var(--text-dim);font-size:12px}

/* Status badges — purple system only, green for done */
.cell-status{
  display:inline-flex;align-items:center;justify-content:center;
  padding:5px 0;border-radius:6px;
  font-family:'Montserrat',sans-serif;font-size:9px;
  letter-spacing:1px;text-transform:uppercase;
  width:100%;text-align:center;
}
.st-novo{
  border:1px solid var(--purple-mist);
  color:var(--purple);background:transparent;
}
.st-analisado{
  background:var(--purple-light);
  color:var(--purple);border:1px solid transparent;
}
.st-pago{
  background:var(--purple);
  color:#fff;border:1px solid transparent;
}
.st-andamento{
  border:1px solid rgba(16,185,129,.25);
  color:var(--green);background:transparent;
}
.st-concluido{
  background:#F3F4F6;
  color:var(--text-dim);border:1px solid transparent;
}

.cell-chevron{
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);transition:transform .3s;
}
.case-card.open .cell-chevron svg{transform:rotate(180deg)}

/* ═══ EXPANDED DETAIL ═══ */
.case-detail{
  max-height:0;overflow:hidden;
  transition:max-height .4s cubic-bezier(.4,0,.2,1);
}
.case-detail-inner{
  padding:0 20px 24px;
}
.detail-divider{
  height:1px;background:var(--border);margin-bottom:20px;
}

.detail-cols{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}
.detail-col{}
.dl{margin-bottom:14px}
.dl-label{
  font-family:'Montserrat',sans-serif;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:4px;
}
.dl-value{font-size:14px;line-height:1.5}
.dl-value.muted{font-size:13px;color:var(--text-sec);font-weight:300}
.dl-value.big{
  font-family:'Montserrat',sans-serif;font-weight:300;
  font-size:22px;color:var(--purple);
}

/* Parecer section */
.parecer-section{
  margin-top:20px;padding-top:20px;
  border-top:1px solid var(--border);
}
.parecer-title{
  font-family:'Montserrat',sans-serif;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:10px;
}
.parecer-text{
  font-size:13px;color:var(--text-sec);
  line-height:1.7;font-weight:300;margin-bottom:12px;
}
.parecer-list{
  list-style:none;display:flex;flex-direction:column;gap:6px;
}
.parecer-list li{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13px;color:var(--text-sec);line-height:1.5;font-weight:300;
}
.parecer-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--purple);margin-top:7px;flex-shrink:0;
}

/* Actions */
.detail-actions{
  margin-top:20px;padding-top:20px;
  border-top:1px solid var(--border);
  display:flex;gap:10px;
}
.act{
  font-family:'Montserrat',sans-serif;font-weight:400;
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:10px 20px;border-radius:8px;cursor:pointer;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.act-primary{background:var(--purple);color:#fff;border:none}
.act-primary:hover{background:var(--purple-deep)}
.act-outline{background:transparent;color:var(--text-sec);border:1px solid var(--border)}
.act-outline:hover{border-color:var(--purple-mist);color:var(--text)}

/* Waiting state */
.waiting-state{
  grid-column:span 2;
  display:flex;align-items:center;gap:12px;
  color:var(--text-dim);font-size:13px;padding:12px 0;
}
.waiting-state svg{color:var(--purple-mist)}

/* Empty */
.empty-state{
  text-align:center;padding:80px 24px;color:var(--text-dim);
  font-size:14px;
}

/* Urgent dot */
.urgent-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--purple);display:inline-block;
  margin-right:4px;animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}50%{opacity:.3}
}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .panel-header{padding:0 20px}
  .summary-bar{padding:24px 20px;flex-wrap:wrap;gap:20px}
  .summary-sep{display:none}
  .controls{padding:0 20px 20px;flex-direction:column;align-items:stretch}
  .control-tabs{flex-wrap:wrap}
  .search-box input{width:100%}
  .cases{padding:0 20px 32px}
  .case-header{display:none}
  .case-row{
    grid-template-columns:1fr auto;
    gap:6px;
  }
  .cell-date{order:3;grid-column:1/-1;margin-top:4px}
  .cell-client{order:1}
  .cell-status{order:2;width:auto;padding:5px 12px}
  .cell-infraction{order:4;grid-column:1/-1}
  .cell-score{order:5;text-align:left}
  .cell-chevron{display:none}
  .detail-cols{grid-template-columns:1fr}
  .detail-actions{flex-direction:column}
}
@media(max-width:480px){
  .summary-bar{gap:16px}
  .summary-number{font-size:22px}
  .tab-btn{padding:8px 12px;font-size:9px}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="panel-header">
  <div class="panel-brand">
    <div class="panel-logo"><span>MULTA</span>CHECK</div>
    <div class="panel-divider"></div>
    <span class="panel-label">Painel</span>
  </div>
  <div class="panel-user">
    Administrador
    <div class="panel-avatar">A</div>
  </div>
</div>

<!-- ═══ SUMMARY ═══ -->
<div class="summary-bar" id="summaryBar"></div>

<!-- ═══ CONTROLS ═══ -->
<div class="controls">
  <div class="control-tabs">
    <button class="tab-btn active" data-filter="todos">Todos</button>
    <button class="tab-btn" data-filter="novo">Novos</button>
    <button class="tab-btn" data-filter="pago">Pagos</button>
    <button class="tab-btn" data-filter="andamento">Em andamento</button>
    <button class="tab-btn" data-filter="concluido">Concluídos</button>
  </div>
  <div class="search-box">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Buscar por nome ou placa..." id="searchInput">
  </div>
</div>

<!-- ═══ CASES ═══ -->
<div class="cases">
  <div class="case-header">
    <span>Data</span>
    <span>Cliente</span>
    <span>Infração</span>
    <span>Score</span>
    <span>Status</span>
    <span></span>
  </div>
  <div id="caseList"></div>
</div>

<script>
(function(){

  /*
   * ═══════════════════════════════════════════════════════════
   *  INTEGRAÇÃO BANCO DE DADOS
   * ═══════════════════════════════════════════════════════════
   *
   *  Substituir MOCK_CASES por fetch() ao seu backend.
   *
   *  async function loadCases(filter) {
   *    const res = await fetch('/api/cases?status=' + filter);
   *    const cases = await res.json();
   *    renderAll(cases);
   *  }
   *
   *  Estrutura esperada de cada caso abaixo.
   *  Campo analiseIA = null quando a IA ainda não processou.
   *
   * ═══════════════════════════════════════════════════════════
   */

  var MOCK_CASES = [
    {
      id:'mc-001',
      data:'28/06/2026',
      cliente:{ nome:'Rafael Oliveira', telefone:'(11) 98452-3310', email:'rafael.oliv@gmail.com' },
      placa:'BRA2E19',
      status:'pago',
      /*
       * ═══════════════════════════════════════
       *  INTEGRAÇÃO IA — campo analiseIA
       * ═══════════════════════════════════════
       *
       *  Retorno da IA após analisar a imagem.
       *  null = aguardando processamento.
       *
       *  Formato esperado:
       *  { grau, pontuacao, tipoInfracao, artigo,
       *    valorMulta, pontosCNH, prazoRecurso,
       *    diasRestantes, resumo, fundamentos[] }
       *
       * ═══════════════════════════════════════
       */
      analiseIA:{
        grau:'MEDIO', pontuacao:65,
        tipoInfracao:'Excesso de velocidade',
        artigo:'Art. 218, I do CTB',
        valorMulta:'R$ 130,16', pontosCNH:4,
        prazoRecurso:'30 dias', diasRestantes:18,
        resumo:'Infração de natureza média registrada por radar eletrônico. Há margem para recurso com base em possíveis irregularidades de sinalização e aferição.',
        fundamentos:[
          'Verificação da calibração do equipamento',
          'Análise da sinalização no local',
          'Conferência dos prazos de notificação'
        ]
      }
    },
    {
      id:'mc-002', data:'27/06/2026',
      cliente:{ nome:'Camila Santos', telefone:'(21) 97331-8820', email:'camila.s@hotmail.com' },
      placa:'RIO4A55', status:'novo', analiseIA:null
    },
    {
      id:'mc-003', data:'26/06/2026',
      cliente:{ nome:'Pedro Almeida', telefone:'(31) 99102-4478', email:'pedroalm@gmail.com' },
      placa:'MGA7B22', status:'andamento',
      analiseIA:{
        grau:'ALTO', pontuacao:82,
        tipoInfracao:'Avanço de sinal vermelho',
        artigo:'Art. 208 do CTB',
        valorMulta:'R$ 293,47', pontosCNH:7,
        prazoRecurso:'30 dias', diasRestantes:5,
        resumo:'Infração gravíssima com registro por câmera de monitoramento. Prazo para recurso próximo do fim. Necessita revisão urgente.',
        fundamentos:[
          'Verificação do tempo do semáforo',
          'Análise das imagens de monitoramento',
          'Checagem de dupla autuação no cruzamento'
        ]
      }
    },
    {
      id:'mc-004', data:'25/06/2026',
      cliente:{ nome:'Ana Beatriz Costa', telefone:'(11) 96778-1234', email:'anab.costa@gmail.com' },
      placa:'SPE3D77', status:'concluido',
      analiseIA:{
        grau:'BAIXO', pontuacao:35,
        tipoInfracao:'Estacionamento irregular',
        artigo:'Art. 181, XVII do CTB',
        valorMulta:'R$ 88,38', pontosCNH:3,
        prazoRecurso:'30 dias', diasRestantes:0,
        resumo:'Infração leve com boas chances de recurso. Sinalização do local apresenta irregularidades documentadas.',
        fundamentos:[
          'Ausência de placa regulamentar visível',
          'Verificação do horário de restrição'
        ]
      }
    },
    {
      id:'mc-005', data:'24/06/2026',
      cliente:{ nome:'Marcos Vinícius', telefone:'(85) 98890-5567', email:'marcosv@outlook.com' },
      placa:'CEA1F33', status:'analisado',
      analiseIA:{
        grau:'MEDIO', pontuacao:58,
        tipoInfracao:'Faixa exclusiva de ônibus',
        artigo:'Art. 184, I do CTB',
        valorMulta:'R$ 130,16', pontosCNH:4,
        prazoRecurso:'30 dias', diasRestantes:22,
        resumo:'Infração média por trafegar em faixa exclusiva. Possível defesa com base em sinalização insuficiente no trecho.',
        fundamentos:[
          'Análise da sinalização horizontal e vertical',
          'Verificação do horário de operação da faixa',
          'Checagem da resolução do órgão local'
        ]
      }
    }
  ];

  var STATUS = {
    novo:      { label:'Novo',          cls:'st-novo' },
    analisado: { label:'Analisado',     cls:'st-analisado' },
    pago:      { label:'Pago',          cls:'st-pago' },
    andamento: { label:'Em andamento',  cls:'st-andamento' },
    concluido: { label:'Concluído',     cls:'st-concluido' },
  };

  var filter = 'todos';

  // ── Summary ──
  function renderSummary(cases){
    var n = cases.length;
    var novos = cases.filter(function(c){return c.status==='novo'}).length;
    var pagos = cases.filter(function(c){return c.status==='pago'}).length;
    var done = cases.filter(function(c){return c.status==='concluido'}).length;

    document.getElementById('summaryBar').innerHTML =
      '<div class="summary-item"><span class="summary-number">'+n+'</span><span class="summary-text">casos</span></div>' +
      '<div class="summary-sep"></div>' +
      '<div class="summary-item"><span class="summary-number accent">'+novos+'</span><span class="summary-text">novos</span></div>' +
      '<div class="summary-sep"></div>' +
      '<div class="summary-item"><span class="summary-number">'+pagos+'</span><span class="summary-text">pagos</span></div>' +
      '<div class="summary-sep"></div>' +
      '<div class="summary-item"><span class="summary-number">'+done+'</span><span class="summary-text">concluídos</span></div>';
  }

  // ── Cases ──
  function renderCases(cases){
    var list = document.getElementById('caseList');
    var items = cases;
    if(filter !== 'todos'){
      items = cases.filter(function(c){return c.status === filter});
    }
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    if(q){
      items = items.filter(function(c){
        return c.cliente.nome.toLowerCase().indexOf(q)>-1 || c.placa.toLowerCase().indexOf(q)>-1;
      });
    }

    if(!items.length){
      list.innerHTML = '<div class="empty-state">Nenhum caso encontrado.</div>';
      return;
    }

    var html = '';
    items.forEach(function(c){
      var st = STATUS[c.status] || STATUS.novo;
      var ia = c.analiseIA;
      var scoreCell = ia
        ? '<span class="score-num">'+ia.pontuacao+'</span>'
        : '<span class="score-none">—</span>';
      var infrText = ia ? ia.tipoInfracao : 'Aguardando análise';
      var urgent = ia && ia.diasRestantes <= 7 && ia.diasRestantes > 0;

      html += '<div class="case-card" data-id="'+c.id+'">';

      // Row
      html += '<div class="case-row" onclick="toggleCase(\''+c.id+'\')">';
      html += '<div class="cell-date">'+c.data+'</div>';
      html += '<div class="cell-client"><div class="cell-name">'+c.cliente.nome+'</div><div class="cell-plate">'+c.placa+'</div></div>';
      html += '<div class="cell-infraction">'+(urgent?'<span class="urgent-dot"></span>':'')+infrText+'</div>';
      html += '<div class="cell-score">'+scoreCell+'</div>';
      html += '<div class="cell-status '+st.cls+'">'+st.label+'</div>';
      html += '<div class="cell-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>';
      html += '</div>';

      // Detail
      html += '<div class="case-detail"><div class="case-detail-inner">';
      html += '<div class="detail-divider"></div>';
      html += buildDetail(c);
      html += '</div></div>';

      html += '</div>';
    });
    list.innerHTML = html;
  }

  function buildDetail(c){
    var ia = c.analiseIA;
    var h = '<div class="detail-cols">';

    // Col 1 — Cliente
    h += '<div class="detail-col">';
    h += dl('Cliente', c.cliente.nome);
    h += dl('Telefone', c.cliente.telefone, true);
    h += dl('E-mail', c.cliente.email, true);
    h += dl('Placa', c.placa);
    h += '</div>';

    if(ia){
      // Col 2 — Multa
      h += '<div class="detail-col">';
      h += dl('Infração', ia.tipoInfracao);
      h += dl('Artigo', ia.artigo, true);
      h += dl('Valor', ia.valorMulta);
      h += dl('Pontos na CNH', ia.pontosCNH + ' pontos', true);
      h += '</div>';

      // Col 3 — IA
      h += '<div class="detail-col">';
      h += '<div class="dl"><div class="dl-label">Score da IA</div><div class="dl-value big">'+ia.pontuacao+'<span style="font-size:13px;color:#9CA3AF;font-weight:300;margin-left:4px">/100</span></div></div>';
      h += dl('Grau', ia.grau);
      h += dl('Prazo restante', ia.diasRestantes > 0 ? ia.diasRestantes+' dias de '+ia.prazoRecurso : 'Expirado', true);
      h += '</div>';
    } else {
      h += '<div class="waiting-state">';
      h += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
      h += 'A IA ainda não processou este caso.';
      h += '</div>';
    }

    h += '</div>'; // detail-cols

    // Parecer
    if(ia){
      h += '<div class="parecer-section">';
      h += '<div class="parecer-title">Parecer preliminar</div>';
      h += '<p class="parecer-text">'+ia.resumo+'</p>';
      h += '<ul class="parecer-list">';
      ia.fundamentos.forEach(function(f){
        h += '<li><div class="parecer-dot"></div>'+f+'</li>';
      });
      h += '</ul></div>';
    }

    // Actions
    h += '<div class="detail-actions">';

    if(c.status === 'novo'){
      /* ═══ AÇÃO: Disparar IA ═══ */
      h += '<button class="act act-primary" onclick="actionAnalyze(\''+c.id+'\')">Analisar agora</button>';
    }
    if(c.status === 'pago'){
      /* ═══ AÇÃO: Iniciar recurso ═══ */
      h += '<button class="act act-primary" onclick="actionStart(\''+c.id+'\')">Iniciar recurso</button>';
    }
    if(c.status === 'andamento'){
      /* ═══ AÇÃO: Concluir ═══ */
      h += '<button class="act act-primary" onclick="actionComplete(\''+c.id+'\')">Marcar concluído</button>';
    }
    /* ═══ AÇÃO: WhatsApp ═══ */
    h += '<button class="act act-outline" onclick="actionWhatsApp(\''+c.cliente.telefone+'\')">Contatar cliente</button>';

    h += '</div>';
    return h;
  }

  function dl(label, value, muted){
    return '<div class="dl"><div class="dl-label">'+label+'</div><div class="dl-value'+(muted?' muted':'')+'">'+value+'</div></div>';
  }

  // ── Toggle ──
  window.toggleCase = function(id){
    var card = document.querySelector('.case-card[data-id="'+id+'"]');
    if(!card) return;
    var detail = card.querySelector('.case-detail');
    var inner = card.querySelector('.case-detail-inner');
    var open = card.classList.contains('open');

    document.querySelectorAll('.case-card.open').forEach(function(c){
      if(c !== card){ c.classList.remove('open'); c.querySelector('.case-detail').style.maxHeight='0'; }
    });

    if(open){ card.classList.remove('open'); detail.style.maxHeight='0'; }
    else { card.classList.add('open'); detail.style.maxHeight=inner.scrollHeight+'px'; }
  };

  /*
   * ═══════════════════════════════════════════════════
   *  AÇÕES — INTEGRAR COM SEU BACKEND
   * ═══════════════════════════════════════════════════
   *
   *  Hoje muda status no array local.
   *  Substituir por fetch() ao backend:
   *
   *  async function actionStart(id) {
   *    await fetch('/api/cases/'+id+'/start',{method:'POST'});
   *    loadCases();
   *  }
   *
   * ═══════════════════════════════════════════════════
   */

  window.actionAnalyze = function(id){
    var c = MOCK_CASES.find(function(x){return x.id===id});
    if(c) c.status = 'analisado';
    alert('Integrar: enviar caso '+id+' para a IA.');
    refresh();
  };
  window.actionStart = function(id){
    var c = MOCK_CASES.find(function(x){return x.id===id});
    if(c) c.status = 'andamento';
    refresh();
  };
  window.actionComplete = function(id){
    var c = MOCK_CASES.find(function(x){return x.id===id});
    if(c) c.status = 'concluido';
    refresh();
  };
  window.actionWhatsApp = function(phone){
    window.open('https://wa.me/55'+phone.replace(/\D/g,''), '_blank');
  };

  function refresh(){ renderSummary(MOCK_CASES); renderCases(MOCK_CASES); }

  // ── Filters ──
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      filter = btn.dataset.filter;
      renderCases(MOCK_CASES);
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input',function(){ renderCases(MOCK_CASES); });

  // ── Init ──
  refresh();

})();
</script>
</body>
</html>
